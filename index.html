<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система голосования</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #141414;
            --border: #262626;
            --text-main: #e5e5e5;
            --text-muted: #737373;
            --state-empty: #262626;
            --state-yes: #16a34a;
            --state-no: #dc2626;
            --state-abstain: #525252;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 24px; }
        .screen { background-color: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 32px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .hidden { display: none !important; }
        h2 { font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.15em; margin: 0 0 24px 0; }
        .status-text { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
        
        input[type="text"] { width: 100%; box-sizing: border-box; background-color: var(--bg); border: 1px solid var(--border); color: var(--text-main); padding: 12px; font-size: 14px; border-radius: 4px; margin-bottom: 24px; outline: none; text-align: center; }
        button { background-color: var(--text-main); color: var(--bg); border: none; padding: 12px 24px; font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; border-radius: 4px; cursor: pointer; }
        button:disabled { background-color: var(--border); color: var(--text-muted); cursor: default; }

        .board { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
        .seats-arc { display: flex; justify-content: center; align-items: flex-start; gap: 14px; height: 60px; padding: 20px 20px 0 20px; }
        .seat { width: 20px; height: 20px; border-radius: 50%; background-color: var(--state-empty); transition: background-color 0.3s ease; }

        /* Эффект изгиба дуги вверх (как на табло НС Армении) */
        .seat-arc-wrapper .seat:nth-child(1), .seat-arc-wrapper .seat:nth-child(11) { transform: translateY(16px); }
        .seat-arc-wrapper .seat:nth-child(2), .seat-arc-wrapper .seat:nth-child(10) { transform: translateY(10px); }
        .seat-arc-wrapper .seat:nth-child(3), .seat-arc-wrapper .seat:nth-child(9)  { transform: translateY(5px); }
        .seat-arc-wrapper .seat:nth-child(4), .seat-arc-wrapper .seat:nth-child(8)  { transform: translateY(2px); }

        .seat.yes { background-color: var(--state-yes); }
        .seat.no { background-color: var(--state-no); }
        .seat.abstain { background-color: var(--state-abstain); }
        .seat.active-leader { background-color: #3b82f6; }

        .vote-actions { display: flex; gap: 8px; width: 100%; justify-content: center; margin-top: 16px; }
        .btn-yes { background-color: #16a34a; color: white; }
        .btn-no { background-color: #dc2626; color: white; }
        .btn-abstain { background-color: #525252; color: white; }

        .results-data { width: 100%; max-width: 300px; margin-bottom: 24px; }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
        .verdict { font-size: 16px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 16px; padding: 12px 24px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .verdict.passed { border: 1px solid var(--state-yes); color: var(--state-yes); }
        .verdict.failed { border: 1px solid var(--state-no); color: var(--state-no); }
        .identity-tag { font-size: 11px; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="container">
    <div id="user-identity" class="identity-tag">Подключение...</div>

    <div id="scr-leader" class="screen">
        <h2>Выборы председателя</h2>
        <div class="board"><div class="seats-arc seat-arc-wrapper" id="leader-seats"></div></div>
        <div class="status-text" id="leader-status">Ожидание запуска процесса</div>
        <button id="btn-start-leader" onclick="triggerLeaderElection()">Запустить голосование</button>
    </div>

    <div id="scr-question" class="screen hidden">
        <h2>Панель председателя</h2>
        <div class="status-text" id="question-status-text">Ожидание ввода повестки дня</div>
        <div id="leader-input-zone" class="hidden">
            <input type="text" id="input-q" placeholder="Введите текст вопроса" autocomplete="off">
            <button onclick="sendQuestion()">Опубликовать вопрос</button>
        </div>
    </div>

    <div id="scr-voting" class="screen hidden">
        <h2 id="vote-q-title">Вопрос:</h2>
        <div class="board"><div class="seats-arc seat-arc-wrapper" id="main-seats"></div></div>
        <div class="status-text" id="vote-status">Голосование открыто</div>
        <div class="vote-actions" id="user-panel">
            <button class="btn-yes" onclick="submitVote('yes')">За</button>
            <button class="btn-no" onclick="submitVote('no')">Против</button>
            <button class="btn-abstain" onclick="submitVote('abstain')">Воздержался</button>
        </div>
    </div>

    <div id="scr-results" class="screen hidden">
        <h2>Протокол заседания</h2>
        <div class="status-text" id="res-q-title">Вопрос</div>
        <div class="results-data">
            <div class="data-row"><span>Голоса «За»</span><span id="r-yes" style="color: var(--state-yes)">0</span></div>
            <div class="data-row"><span>Голоса «Против»</span><span id="r-no" style="color: var(--state-no)">0</span></div>
            <div class="data-row"><span>Воздержались</span><span id="r-abstain" style="color: var(--state-abstain)">0</span></div>
        </div>
        <div id="verdict-block" class="verdict"></div>
        <button id="btn-reset" class="hidden" style="margin-top: 24px;" onclick="triggerReset()">Новая сессия</button>
    </div>
</div>

<script>
    const socket = io();
    let mySeatIndex = -1;

    function buildSeats(containerId) {
        const el = document.getElementById(containerId);
        el.innerHTML = '';
        for(let i=0; i<11; i++) {
            const s = document.createElement('div');
            s.classList.add('seat');
            s.id = `${containerId}-s-${i}`;
            el.appendChild(s);
        }
    }

    buildSeats('leader-seats');

    socket.on('init', (data) => {
        mySeatIndex = data.yourSeat;
        const tag = document.getElementById('user-identity');
        tag.innerText = mySeatIndex !== -1 ? `Ваше место: Участник №${mySeatIndex + 1}` : "Режим наблюдателя (Зал полон)";
        updateUI(data.state);
    });

    socket.on('updateState', (state) => { updateUI(state); });

    socket.on('leaderSelecting', (finalLeader) => {
        let current = 0;
        const interval = setInterval(() => {
            document.querySelectorAll('#leader-seats .seat').forEach(s => s.classList.remove('active-leader'));
            const currentSeatEl = document.getElementById(`leader-seats-s-${current}`);
            if(currentSeatEl) currentSeatEl.classList.add('active-leader');
            current = (current + 1) % 11;
        }, 100);

        setTimeout(() => {
            clearInterval(interval);
            document.querySelectorAll('#leader-seats .seat').forEach(s => s.classList.remove('active-leader'));
            const leaderSeatEl = document.getElementById(`leader-seats-s-${finalLeader}`);
            if(leaderSeatEl) leaderSeatEl.classList.add('active-leader');
            document.getElementById('leader-status').innerText = `Председателем определен Участник №${finalLeader + 1}`;
        }, 2000);
    });

    socket.on('seatUpdated', (data) => {
        const seatEl = document.getElementById(`main-seats-s-${data.seat}`);
        if(seatEl) seatEl.className = `seat ${data.choice}`;
    });

    function updateUI(state) {
        document.getElementById('scr-leader').classList.add('hidden');
        document.getElementById('scr-question').classList.add('hidden');
        document.getElementById('scr-voting').classList.add('hidden');
        document.getElementById('scr-results').classList.add('hidden');

        if (state.stage === 'LEADER_ELECTION') {
            document.getElementById('scr-leader').classList.remove('hidden');
            buildSeats('leader-seats');
            document.getElementById('btn-start-leader').disabled = (mySeatIndex !== 0); 
            document.getElementById('leader-status').innerText = mySeatIndex === 0 ? "Вы можете запустить выбор председателя" : "Ожидание запуска первым участником";
        } 
        else if (state.stage === 'QUESTION_INPUT') {
            document.getElementById('scr-question').classList.remove('hidden');
            const isLeader = (mySeatIndex === state.leaderSeat);
            const inputZone = document.getElementById('leader-input-zone');
            const statusTxt = document.getElementById('question-status-text');
            
            if (isLeader) {
                inputZone.classList.remove('hidden');
                statusTxt.innerText = "Вы выбраны главным. Введите повестку:";
            } else {
                inputZone.classList.add('hidden');
                statusTxt.innerText = `Ожидание вопроса от Главного (Участник №${state.leaderSeat + 1})`;
            }
        } 
        else if (state.stage === 'VOTING') {
            document.getElementById('scr-voting').classList.remove('hidden');
            document.getElementById('vote-q-title').innerText = `Вопрос: ${state.question}`;
            buildSeats('main-seats');
            
            for(let i=0; i<11; i++) {
                if(state.seats[i] !== 'empty') {
                    document.getElementById(`main-seats-s-${i}`).className = `seat ${state.seats[i]}`;
                }
            }

            const activePanel = document.getElementById('user-panel');
            const alreadyVoted = state.seats[mySeatIndex] !== 'empty';
            
            if(mySeatIndex === -1 || alreadyVoted) {
                activePanel.querySelectorAll('button').forEach(b => b.disabled = true);
                document.getElementById('vote-status').innerText = alreadyVoted ? "Ваш выбор принят. Ожидание остальных." : "Наблюдение за ходом сессии.";
            } else {
                activePanel.querySelectorAll('button').forEach(b => b.disabled = false);
                document.getElementById('vote-status').innerText = "Сделайте ваш выбор:";
            }
        } 
        else if (state.stage === 'RESULTS') {
            document.getElementById('scr-results').classList.remove('hidden');
            document.getElementById('res-q-title').innerText = state.question;

            let yesCount = state.seats.filter(s => s === 'yes').length;
            let noCount = state.seats.filter(s => s === 'no').length;
            let abstainCount = state.seats.filter(s => s === 'abstain').length;
            let actualVotes = yesCount + noCount + abstainCount;

            document.getElementById('r-yes').innerText = yesCount;
            document.getElementById('r-no').innerText = noCount;
            document.getElementById('r-abstain').innerText = abstainCount;

            const vBlock = document.getElementById('verdict-block');
            const majority = Math.floor(actualVotes / 2) + 1;

            if (yesCount >= majority && yesCount > 0) {
                vBlock.innerText = "Решение принято";
                vBlock.className = "verdict passed";
            } else {
                vBlock.innerText = "Решение отклонено";
                vBlock.className = "verdict failed";
            }

            const resetBtn = document.getElementById('btn-reset');
            if (mySeatIndex === state.leaderSeat) {
                resetBtn.classList.remove('hidden');
            } else {
                resetBtn.classList.add('hidden');
            }
        }
    }

    function triggerLeaderElection() { socket.emit('startLeaderElection'); }
    function sendQuestion() { const txt = document.getElementById('input-q').value.trim(); if(txt) socket.emit('submitQuestion', txt); }
    function submitVote(type) { socket.emit('castVote', type); }
    function triggerReset() { socket.emit('resetAll'); }
</script>
</body>
</html>
